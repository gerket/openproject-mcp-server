name: PR Title

on:
  pull_request:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check conventional commit format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | grep -qP '^(feat|fix|chore|docs|refactor|test|ci|perf|style|revert)(\(.+\))?!?: .+'; then
            echo "PR title must follow Conventional Commits format."
            echo "Expected: <type>(<scope>): <description>"
            echo "Types: feat, fix, chore, docs, refactor, test, ci, perf, style, revert"
            echo "Got: $TITLE"
            exit 1
          fi
