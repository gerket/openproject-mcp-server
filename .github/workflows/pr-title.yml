name: PR Title

on:
  pull_request:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: true
          scopes: |
            server
            api
            tools
            ci
            deps
            config
            docs
            tests
            release
            auth
